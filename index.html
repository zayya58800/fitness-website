<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MuscleMap Myanmar | 健身训练助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <!-- Desktop nav bar (hidden on mobile) -->
    <header class="app-header">
        <div class="logo">
            <div class="logo-icon">💪</div>
            <span>MuscleMap</span>
        </div>
        <div class="nav-links" id="navLinks">
            <a data-page="home" class="active">🏠 首页</a>
            <a data-page="train">🔥 训练</a>
            <a data-page="cardio">🏃 跑步</a>
            <a data-page="nutrition">🥗 饮食</a>
            <a data-page="library">📚 动作库</a>
            <a data-page="progress">📈 进度</a>
            <a data-page="yearSummary">📅 年度</a>
            <a data-page="contact">📧 联系</a>
        </div>
        <button class="burger" id="burgerBtn">☰</button>
    </header>

    <!-- Page content -->
    <main id="app">
        <div class="container" style="text-align:center; padding: 3rem;">
            <div class="card">加载中...</div>
        </div>
    </main>

    <!-- Mobile bottom navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
        </button>
        <button class="nav-item" data-page="train">
            <span class="nav-icon">🔥</span>
            <span class="nav-label">训练</span>
        </button>
        <button class="nav-item" data-page="cardio">
            <span class="nav-icon">🏃</span>
            <span class="nav-label">跑步</span>
        </button>
        <button class="nav-item" data-page="nutrition">
            <span class="nav-icon">🥗</span>
            <span class="nav-label">饮食</span>
        </button>
        <button class="nav-item" data-page="progress">
            <span class="nav-icon">📈</span>
            <span class="nav-label">进度</span>
        </button>
        <button class="nav-item" data-page="yearSummary">
            <span class="nav-icon">📅</span>
            <span class="nav-label">年度</span>
        </button>
    </nav>
</div>

<script src="data.js"></script>
<script src="utils.js"></script>
<script src="app.js"></script>
</body>
</html>
